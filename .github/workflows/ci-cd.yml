name: CI-CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build
        run: ./mvnw -q clean compile

      - name: Test
        run: ./mvnw -q test

      - name: Package jar
        run: ./mvnw -q -DskipTests package

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/app.jar

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Download jar artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: .

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VM_SSH_KEY }}

      - name: Copy jar to VM
        run: |
          scp -o StrictHostKeyChecking=no -P 22 app.jar "${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:~/store-api/app.jar"

      - name: Restart service on VM
        run: |
          ssh -o StrictHostKeyChecking=no -p 22 "${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}" "sudo systemctl restart store-api && sudo systemctl is-active store-api"
